version: 1
frontend:
  phases:
    preBuild:
      commands:
        - "export NODE_OPTIONS=--no-deprecation"
        - "echo Installing Node version from .nvmrc"
        - "nvm install $(cat .nvmrc)"
        - "nvm use $(cat .nvmrc)"
        - "node -v"
        - "yarn -v"
        - "yarn install"
    build:
      commands:
        - "export NODE_OPTIONS=--no-deprecation"
        - "yarn build"
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .yarn/cache/**/*
      - node_modules/**/*
