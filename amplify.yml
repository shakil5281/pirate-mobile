version: 1
frontend:
  phases:
    preBuild:
      commands:
        - echo "Installing Node version from .nvmrc: $(cat .nvmrc)"
        - nvm install $(cat .nvmrc)
        - nvm use $(cat .nvmrc)
        - node -v
        - yarn -v
        - yarn install --frozen-lockfile
    build:
      commands:
        - yarn build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .yarn/cache/**/*
      - node_modules/**/*
